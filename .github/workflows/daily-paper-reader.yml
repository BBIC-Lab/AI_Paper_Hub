name: daily-paper-reader

on:
  schedule:
    - cron: "0 19 * * 0-4" # 北京时间周一至周五 03:00（UTC 周日至周四 19:00）
  workflow_dispatch:
    inputs:
      run_enrich:
        description: "Run 0.enrich_config_queries.py（默认关闭，按需开启）"
        required: false
        default: "false"
      fetch_days:
        description: "回溯抓取天数（例如 5 或 30）；留空则使用默认配置"
        required: false
        default: "5"
      fetch_mode:
        description: "抓取模式：auto/standard/skims（auto 按 fetch-days 阈值决定，standard/ skims 强制）"
        required: false
        default: "auto"
      profile_tag:
        description: "仅运行指定词条 tag；留空表示全量运行"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: daily-paper-reader
  cancel-in-progress: false

jobs:
  run:
    if: github.repository == 'BBIC-Lab/AI_Paper_Hub'
    runs-on: ${{ fromJSON(vars.DPR_RUNNER_LABELS || '["ubuntu-latest"]') }}
    timeout-minutes: 120
    env:
      DPR_LLM_PROVIDER: ${{ vars.DPR_LLM_PROVIDER || secrets.DPR_LLM_PROVIDER || 'openai' }}
      DPR_LLM_API_KEY: ${{ secrets.DPR_LLM_API_KEY }}
      DPR_LLM_BASE_URL: ${{ vars.DPR_LLM_BASE_URL || secrets.DPR_LLM_BASE_URL }}
      DPR_LLM_MODEL: ${{ vars.DPR_LLM_MODEL || secrets.DPR_LLM_MODEL }}
      DPR_LLM_REWRITE_MODEL: ${{ vars.DPR_LLM_REWRITE_MODEL || secrets.DPR_LLM_REWRITE_MODEL || vars.DPR_LLM_MODEL || secrets.DPR_LLM_MODEL }}
      DPR_LLM_FILTER_MODEL: ${{ vars.DPR_LLM_FILTER_MODEL || secrets.DPR_LLM_FILTER_MODEL || vars.DPR_LLM_MODEL || secrets.DPR_LLM_MODEL }}
      DPR_LLM_SUMMARY_MODEL: ${{ vars.DPR_LLM_SUMMARY_MODEL || secrets.DPR_LLM_SUMMARY_MODEL || vars.DPR_LLM_MODEL || secrets.DPR_LLM_MODEL }}
      MODEL_API_KEY: ${{ secrets.MODEL_API_KEY }}
      DPR_SKIP_RERANK: ${{ vars.DPR_SKIP_RERANK || 'true' }}
      DPR_EMBED_PROFILE: ${{ vars.DPR_EMBED_PROFILE || 'default_remote' }}
      DPR_EMBED_PROVIDER: ${{ vars.DPR_EMBED_PROVIDER || 'legacy' }}
      DPR_EMBED_MODEL: ${{ vars.DPR_EMBED_MODEL || 'BAAI/bge-small-en-v1.5' }}
      DPR_EMBED_ENDPOINT: ${{ vars.DPR_EMBED_ENDPOINT || '' }}
      EMBED_ENDPOINT: ${{ vars.DPR_EMBED_ENDPOINT || '' }}
      DPR_EMBED_DEFAULT_API_URL: ${{ vars.DPR_EMBED_DEFAULT_API_URL || '' }}
      DPR_EMBED_DEFAULT_API_KEY: ${{ secrets.DPR_EMBED_DEFAULT_API_KEY || '' }}
      DPR_EMBED_API_KEY: ${{ secrets.MODEL_API_KEY }}
      DPR_EMBED_API_TIMEOUT: ${{ vars.DPR_EMBED_API_TIMEOUT || '60' }}
      DPR_EMBED_REMOTE_FALLBACK: ${{ vars.DPR_EMBED_REMOTE_FALLBACK || 'local' }}
      DPR_SKIP_LOCAL_EMBED_DEPS: ${{ vars.DPR_SKIP_LOCAL_EMBED_DEPS || 'false' }}
      # 默认远程 embedding 也保留本地候选池，避免 Supabase 向量 RPC 抖动跳过 embedding。
      DPR_DISABLE_SUPABASE_VECTOR: "true"
      DPR_RERANK_PROVIDER: ${{ vars.DPR_RERANK_PROVIDER || 'openai' }}
      DPR_RERANK_MODEL: ${{ vars.DPR_RERANK_MODEL || 'Qwen/Qwen3-Reranker-0.6B' }}
      DPR_RERANK_ENDPOINT: ${{ vars.DPR_RERANK_ENDPOINT || 'http://127.0.0.1:8011/v1/rerank' }}
      RERANK_ENDPOINT: ${{ vars.DPR_RERANK_ENDPOINT || 'http://127.0.0.1:8011/v1/rerank' }}
      DPR_RERANK_API_KEY: ${{ secrets.MODEL_API_KEY }}
      DPR_RERANK_API_TIMEOUT: ${{ vars.DPR_RERANK_API_TIMEOUT || '60' }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify private downstream target
        run: |
          set -euo pipefail

          if [ "${GITHUB_REPOSITORY}" != "BBIC-Lab/AI_Paper_Hub" ]; then
            echo "::error::daily-paper-reader is only allowed in private downstream BBIC-Lab/AI_Paper_Hub."
            exit 1
          fi

          origin_url="$(git remote get-url origin || true)"
          case "$origin_url" in
            *"BBIC-Lab/AI_Paper_Hub"*) ;;
            *)
              echo "::error::origin is not the BBIC private downstream repository; refusing to run."
              exit 1
              ;;
          esac
          case "$origin_url" in
            *"AI_Daily_Paper_Reader"*)
              echo "::error::origin points to the public upstream repository; refusing to run."
              exit 1
              ;;
          esac

          echo "Private downstream origin verified; generated reports will be pushed only to origin."

      - name: Check auto daily status
        id: daily_auto
        if: github.event_name == 'schedule'
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def parse_bool(value):
              token = str(value or "").split("#", 1)[0].strip().strip("'\"").lower()
              if token in {"false", "no", "off", "0"}:
                  return False
              if token in {"true", "yes", "on", "1"}:
                  return True
              return None

          enabled = True
          section = None
          config_path = Path("config.yaml")
          if config_path.exists():
              for raw in config_path.read_text(encoding="utf-8").splitlines():
                  stripped = raw.strip()
                  if not stripped or stripped.startswith("#"):
                      continue
                  indent = len(raw) - len(raw.lstrip(" "))
                  if indent == 0 and stripped.endswith(":"):
                      section = stripped[:-1].strip()
                      continue
                  if indent == 0:
                      section = None
                  if section == "daily_reports" and indent > 0 and stripped.startswith("enabled:"):
                      parsed = parse_bool(stripped.split(":", 1)[1])
                      if parsed is not None:
                          enabled = parsed
                      break

          value = "true" if enabled else "false"
          with open(Path.cwd() / ".github_output_daily", "w", encoding="utf-8") as tmp:
              tmp.write(f"enabled={value}\n")
          print(f"daily_reports.enabled={value}")
          PY
          cat .github_output_daily >> "$GITHUB_OUTPUT"
          rm -f .github_output_daily

      - name: Stop scheduled auto daily
        if: github.event_name == 'schedule' && steps.daily_auto.outputs.enabled == 'false'
        run: echo "Scheduled daily report is paused by config.yaml daily_reports.enabled=false."

      - name: Random delay to spread scheduled runs
        if: github.event_name == 'schedule' && steps.daily_auto.outputs.enabled != 'false'
        run: |
          DELAY=$(shuf -i 0-3599 -n 1)
          echo "Sleeping ${DELAY}s (≈$((DELAY/60))min) to stagger fork runs over 1 hour …"
          sleep $DELAY

      - name: Preflight inference settings
        if: steps.daily_auto.outputs.enabled != 'false'
        run: |
          set -euo pipefail

          fail() {
            echo "::error::$1" >&2
            exit 1
          }

          [ -n "${DPR_LLM_API_KEY:-}" ] || fail "DPR_LLM_API_KEY GitHub Secret is required for LLM refine/docs."
          llm_filter_model="${DPR_LLM_FILTER_MODEL:-${DPR_LLM_MODEL:-}}"
          llm_summary_model="${DPR_LLM_SUMMARY_MODEL:-${DPR_LLM_MODEL:-}}"
          [ -n "$llm_filter_model" ] || fail "DPR_LLM_FILTER_MODEL or DPR_LLM_MODEL is required for Step 4 LLM refine."
          [ -n "$llm_summary_model" ] || fail "DPR_LLM_SUMMARY_MODEL or DPR_LLM_MODEL is required for Step 6 docs generation."
          [ -n "${DPR_EMBED_MODEL:-}" ] || fail "DPR_EMBED_MODEL is required."

          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request


          def fail(message: str) -> None:
              print(f"::error::{message}", file=sys.stderr)
              raise SystemExit(1)


          DEFAULT_EMBED_ENDPOINT = "https://embed.zwwen.online/embed"
          RERANK_ENABLED_VALUES = {"0", "false", "no", "off"}


          class PreflightError(RuntimeError):
              pass


          def warn(message: str) -> None:
              print(f"::warning::{message}", flush=True)


          def env_text(*names: str, default: str = "") -> str:
              for name in names:
                  value = str(os.environ.get(name) or "").strip()
                  if value:
                      return value
              return str(default or "").strip()


          def normalize_profile(value: str) -> str:
              text = str(value or "").strip().lower()
              if text in {"", "default", "remote", "default_remote"}:
                  return "default_remote"
              if text in {"local", "advanced", "custom"}:
                  return text
              fail(f"Unsupported DPR_EMBED_PROFILE={value}.")


          def normalize_provider(value: str) -> str:
              text = str(value or "").strip().lower()
              if text in {"openai", "openai-compatible", "openai_compatible", "vllm"}:
                  return "openai"
              if text in {"", "legacy", "custom"}:
                  return "legacy"
              fail(f"Unsupported embedding provider={value}.")


          def normalize_embedding_endpoint(endpoint: str, provider: str) -> str:
              text = str(endpoint or "").strip().rstrip("/")
              if not text:
                  fail("Embedding endpoint is empty.")
              if provider == "openai":
                  if text.endswith("/v1/embeddings"):
                      return text
                  if text.endswith("/v1"):
                      return f"{text}/embeddings"
                  return text
              if text.endswith("/embed"):
                  return text
              return f"{text}/embed"


          def should_skip_rerank() -> bool:
              value = env_text("DPR_SKIP_RERANK", default="true").lower()
              return value not in RERANK_ENABLED_VALUES


          def post_json(name: str, url: str, payload: dict, timeout_var: str, api_key: str = "") -> dict:
              body = json.dumps(payload).encode("utf-8")
              headers = {
                  "Content-Type": "application/json",
              }
              if api_key:
                  headers["Authorization"] = f"Bearer {api_key}"
              request = urllib.request.Request(
                  url,
                  data=body,
                  headers=headers,
                  method="POST",
              )
              try:
                  timeout = int(os.environ.get(timeout_var, "60") or "60")
              except ValueError:
                  fail(f"{timeout_var} must be an integer number of seconds.")
              try:
                  with urllib.request.urlopen(request, timeout=timeout) as response:
                      if response.status < 200 or response.status >= 300:
                          raise PreflightError(f"{name} preflight failed with HTTP {response.status}.")
                      raw = response.read()
              except PreflightError:
                  raise
              except urllib.error.HTTPError as exc:
                  raise PreflightError(
                      f"{name} preflight failed with HTTP {exc.code}; check model name, endpoint, and service auth."
                  ) from exc
              except Exception as exc:
                  raise PreflightError(
                      f"{name} preflight failed before response: {exc.__class__.__name__}: {exc}"
                  ) from exc
              try:
                  return json.loads(raw.decode("utf-8") or "{}")
              except Exception as exc:
                  raise PreflightError(
                      f"{name} preflight returned non-JSON response: {exc.__class__.__name__}."
                  ) from exc


          def preflight_embedding() -> None:
              profile = normalize_profile(env_text("DPR_EMBED_PROFILE", default="default_remote"))
              provider = normalize_provider(env_text("DPR_EMBED_PROVIDER", default="legacy"))
              model = env_text("DPR_EMBED_MODEL", default="BAAI/bge-small-en-v1.5")
              fallback = env_text("DPR_EMBED_REMOTE_FALLBACK", default="local").lower()
              if fallback not in {"local", "fail"}:
                  fallback = "local"
              if profile in {"local", "advanced"}:
                  print(f"Embedding preflight skipped for {profile} profile; runtime will load the local model.")
                  return
              if profile == "default_remote":
                  fallback = "local"
              allow_local_fallback = fallback == "local"
              if profile == "default_remote":
                  endpoint = env_text("DPR_EMBED_DEFAULT_API_URL", default=DEFAULT_EMBED_ENDPOINT)
                  if endpoint.rstrip("/") == DEFAULT_EMBED_ENDPOINT:
                      provider = "legacy"
                  api_key = env_text("DPR_EMBED_DEFAULT_API_KEY")
              else:
                  endpoint = env_text("DPR_EMBED_ENDPOINT", "EMBED_ENDPOINT", "DPR_EMBED_API_URL")
                  api_key = env_text("DPR_EMBED_API_KEY", "MODEL_API_KEY", "EMBED_API_KEY", "EMBED_KEY")
                  if not api_key:
                      fail("MODEL_API_KEY or DPR_EMBED_API_KEY is required for custom embedding preflight.")
              url = normalize_embedding_endpoint(endpoint, provider)
              payload = (
                  {"model": model, "input": ["preflight"]}
                  if provider == "openai"
                  else {"texts": ["preflight"]}
              )
              try:
                  embed = post_json("Embedding", url, payload, "DPR_EMBED_API_TIMEOUT", api_key)
              except PreflightError as exc:
                  if allow_local_fallback:
                      warn(f"{exc}; continuing because DPR_EMBED_REMOTE_FALLBACK=local allows runtime local fallback.")
                      return
                  fail(str(exc))
              vectors = None
              data = embed.get("data") if isinstance(embed, dict) else None
              if isinstance(data, list) and data:
                  first = data[0]
                  vectors = [first.get("embedding")] if isinstance(first, dict) else None
              if vectors is None and isinstance(embed, dict):
                  vectors = embed.get("embeddings")
              if not isinstance(vectors, list) or not vectors or not isinstance(vectors[0], list) or not vectors[0]:
                  message = "Embedding preflight response missing embedding vector."
                  if allow_local_fallback:
                      warn(f"{message}; continuing because DPR_EMBED_REMOTE_FALLBACK=local allows runtime local fallback.")
                      return
                  fail(message)
              print(f"Embedding model interface OK ({profile}/{provider}).")


          def preflight_reranker() -> None:
              if should_skip_rerank():
                  print("Reranker preflight skipped because DPR_SKIP_RERANK is not false; Step 3 will use RRF fallback.")
                  return
              provider = env_text("DPR_RERANK_PROVIDER", default="openai").lower()
              if provider not in {"openai", "openai-compatible", "openai_compatible", "vllm"}:
                  fail("DPR_RERANK_PROVIDER must be openai-compatible when DPR_SKIP_RERANK=false.")
              endpoint = env_text("DPR_RERANK_ENDPOINT", "RERANK_ENDPOINT")
              model = env_text("DPR_RERANK_MODEL")
              api_key = env_text("DPR_RERANK_API_KEY", "MODEL_API_KEY", "RERANK_API_KEY")
              if not endpoint:
                  fail("DPR_RERANK_ENDPOINT is required when DPR_SKIP_RERANK=false.")
              if not model:
                  fail("DPR_RERANK_MODEL is required when DPR_SKIP_RERANK=false.")
              if not api_key:
                  fail("MODEL_API_KEY or DPR_RERANK_API_KEY is required when DPR_SKIP_RERANK=false.")
              try:
                  rerank = post_json(
                      "Reranker",
                      endpoint,
                      {
                          "model": model,
                          "query": "preflight",
                          "documents": ["first candidate", "second candidate"],
                          "top_n": 1,
                      },
                      "DPR_RERANK_API_TIMEOUT",
                      api_key,
                  )
              except PreflightError as exc:
                  fail(str(exc))
              results = rerank.get("results")
              if results is None and isinstance(rerank.get("output"), dict):
                  results = rerank["output"].get("results")
              if results is None:
                  results = rerank.get("data")
              if not isinstance(results, list):
                  fail("Reranker preflight response missing results/data list.")
              print("Reranker model interface OK.")


          preflight_embedding()
          preflight_reranker()
          PY

      - name: Setup Python
        if: steps.daily_auto.outputs.enabled != 'false'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Java
        if: steps.daily_auto.outputs.enabled != 'false'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Python deps
        if: steps.daily_auto.outputs.enabled != 'false'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.cache/uv
            ~/.cache/torch
            ~/.cache/dpr-tools/pdffigures2
            ~/.cache/coursier
            ~/.ivy2/cache
            ~/.sbt
          key: ${{ runner.os }}-dpr-remote-deps-v1-${{ hashFiles('requirements.txt') }}

      - name: Install deps
        if: steps.daily_auto.outputs.enabled != 'false'
        run: |
          if [ "${DPR_SKIP_LOCAL_EMBED_DEPS:-false}" = "true" ]; then
          python - <<'PY'
          import re

          # 高级自建远程推理可跳过本地 torch 栈；默认 embedding 仍保留本地 fallback。
          skip_names = {"sqlite3", "sentence-transformers", "torch", "cuda-toolkit"}
          skip_prefixes = ("nvidia-",)
          kept = []
          skipped = []
          for line in open("requirements.txt", "r", encoding="utf-8").read().splitlines():
              item = line.strip()
              if not item:
                  continue
              package = re.split(r"\s*(?:[<>=!~]=?|;|\[)", item, 1)[0].lower().replace("_", "-")
              if package in skip_names or package.startswith(skip_prefixes):
                  skipped.append(item)
                  continue
              kept.append(line)
          open("/tmp/req.txt", "w", encoding="utf-8").write("\n".join(kept))
          print("Skipped local embedding deps:", ", ".join(skipped) or "<none>")
          PY
          else
            cp requirements.txt /tmp/req.txt
          fi
          python -m pip install --upgrade pip
          python -m pip install uv
          UV_HTTP_TIMEOUT="${UV_HTTP_TIMEOUT:-120}" uv pip install --system -r /tmp/req.txt

      - name: Prepare pdffigures2
        if: steps.daily_auto.outputs.enabled != 'false'
        run: |
          set -euo pipefail

          TOOL_DIR="$HOME/.cache/dpr-tools/pdffigures2"
          SRC_DIR="$TOOL_DIR/src"
          JAR_PATH="$TOOL_DIR/pdffigures2.jar"

          configure_java_proxy() {
            local proxy="${https_proxy:-${HTTPS_PROXY:-}}"
            if [ -z "$proxy" ]; then
              return 0
            fi
            proxy="${proxy#*://}"
            proxy="${proxy%%/*}"
            local host="${proxy%%:*}"
            local port="${proxy##*:}"
            if [ -z "$host" ] || [ -z "$port" ] || [ "$host" = "$port" ]; then
              echo "::warning::Unable to parse HTTPS proxy for Java tools; continuing without JVM proxy options."
              return 0
            fi
            # sbt/coursier runs inside the JVM and does not reliably honor https_proxy.
            export JAVA_TOOL_OPTIONS="${JAVA_TOOL_OPTIONS:-} -Dhttp.proxyHost=${host} -Dhttp.proxyPort=${port} -Dhttps.proxyHost=${host} -Dhttps.proxyPort=${port} -Dhttp.nonProxyHosts=localhost|127.0.0.1"
          }

          retry() {
            local attempt=1
            local delay=5
            until "$@"; do
              if [ "$attempt" -ge 6 ]; then
                return 1
              fi
              echo "Retry ${attempt}/5 after ${delay}s: $*" >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          mkdir -p "$TOOL_DIR"
          if [ ! -f "$JAR_PATH" ]; then
            configure_java_proxy
            if [ ! -d "$SRC_DIR/.git" ]; then
              if [ -e "$SRC_DIR" ]; then
                echo "::error::$SRC_DIR exists but is not a git checkout; move it aside before retrying."
                exit 1
              fi
              retry git clone --depth 1 https://github.com/allenai/pdffigures2 "$SRC_DIR"
            fi
            cd "$SRC_DIR"
            if [ ! -x ./sbt/bin/sbt ]; then
              retry curl --retry 5 --retry-all-errors --retry-delay 5 --connect-timeout 30 --max-time 300 -fsSL -o sbt.tgz https://github.com/sbt/sbt/releases/download/v1.10.1/sbt-1.10.1.tgz
              tar -xzf sbt.tgz
            fi
            retry ./sbt/bin/sbt assembly
            cp pdffigures2.jar "$JAR_PATH"
          fi

          echo "PDFFIGURES2_JAR=$JAR_PATH" >> "$GITHUB_ENV"

      - name: Run Retrieval and Embedding
        if: steps.daily_auto.outputs.enabled != 'false'
        env:
          HF_HOME: ${{ github.workspace }}/hf_cache
          HUGGINGFACE_HUB_CACHE: ${{ github.workspace }}/hf_cache
          HF_HUB_DISABLE_SYMLINKS: "1"
        run: |
          echo "Cleaning any previous local cache..."
          rm -rf ${{ github.workspace }}/hf_cache

          echo "=== Debug: runtime env ==="
          echo "PWD=$(pwd)"
          echo "HOME=$HOME"
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "HF_HOME=$HF_HOME"
          echo "HUGGINGFACE_HUB_CACHE=$HUGGINGFACE_HUB_CACHE"
          echo "HF_HUB_DISABLE_SYMLINKS=$HF_HUB_DISABLE_SYMLINKS"
          echo "TRANSFORMERS_CACHE=${TRANSFORMERS_CACHE:-<unset>}"
          echo "XDG_CACHE_HOME=${XDG_CACHE_HOME:-<unset>}"
          echo "--- env (filtered) ---"
          env | grep -E '^(HF_|HUGGINGFACE_|TRANSFORMERS_|XDG_|HOME=|GITHUB_WORKSPACE=)' | sort || true

          echo "--- python/hf versions ---"
          python - <<'PY'
          import os
          def v(mod):
            try:
              m = __import__(mod)
              return getattr(m, "__version__", "<no __version__>")
            except Exception as e:
              return f"<import failed: {e}>"

          print("python_exe:", os.environ.get("PYTHON", ""))
          print("HF_HOME env:", os.environ.get("HF_HOME"))
          print("HUGGINGFACE_HUB_CACHE env:", os.environ.get("HUGGINGFACE_HUB_CACHE"))
          print("HF_HUB_DISABLE_SYMLINKS env:", os.environ.get("HF_HUB_DISABLE_SYMLINKS"))
          print("TRANSFORMERS_CACHE env:", os.environ.get("TRANSFORMERS_CACHE"))
          print("versions:", {
            "huggingface_hub": v("huggingface_hub"),
            "transformers": v("transformers"),
            "sentence_transformers": v("sentence_transformers"),
          })
          try:
            from huggingface_hub import constants as c
            print("hub.constants:", {
              "HF_HOME": getattr(c, "HF_HOME", None),
              "HUGGINGFACE_HUB_CACHE": getattr(c, "HUGGINGFACE_HUB_CACHE", None),
              "HF_HUB_DISABLE_SYMLINKS": getattr(c, "HF_HUB_DISABLE_SYMLINKS", None),
            })
          except Exception as e:
            print("hub.constants import failed:", e)
          PY

          echo "--- cache dir check ---"
          echo "[legacy] ~/.cache/huggingface:"
          ls -la ~/.cache/huggingface || true
          echo "[current] $HF_HOME:"
          ls -la "$HF_HOME" || true

          echo "Running main script..."
          RUN_ENRICH="${{ github.event.inputs.run_enrich }}"
          FETCH_DAYS="${{ github.event.inputs.fetch_days }}"
          FETCH_MODE="${{ github.event.inputs.fetch_mode }}"
          PROFILE_TAG="${{ github.event.inputs.profile_tag }}"
          if [ -z "$FETCH_DAYS" ]; then
            FETCH_DAYS="5"
          fi
          ARGS=()
          if [ "$RUN_ENRICH" = "true" ]; then
            ARGS+=(--run-enrich)
          fi
          if [ -n "$FETCH_DAYS" ]; then
            ARGS+=(--fetch-days "$FETCH_DAYS")
          fi
          if [ "${{ github.event_name }}" = "schedule" ]; then
            ARGS+=(--fetch-ignore-seen)
          fi
          if [ -n "$FETCH_MODE" ]; then
            ARGS+=(--fetch-mode "$FETCH_MODE")
          fi
          if [ -n "$PROFILE_TAG" ]; then
            ARGS+=(--profile-tag "$PROFILE_TAG")
          fi
          python src/main.py "${ARGS[@]}" --embedding-device cpu --embedding-batch-size 8

          # 让前端可以在不配置 GitHub Token 的情况下直接读取配置（只读快照）
          cp -f config.yaml docs/config.yaml

          echo "--- post-run cache symlink check ---"
          find "$HF_HOME" -xtype l | head -n 50 || true

      - name: Cleanup non-recommend archives
        if: steps.daily_auto.outputs.enabled != 'false'
        run: |
          find archive -mindepth 2 -maxdepth 2 -type d \( -name raw -o -name filtered -o -name rank \) -exec rm -rf {} +

      - name: Commit results
        if: steps.daily_auto.outputs.enabled != 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          branch="${GITHUB_REF_NAME:-main}"

          shopt -s nullglob
          public_paths=(docs config.yaml)
          private_archive_paths=()
          if [ -f archive/arxiv_seen.json ]; then
            private_archive_paths+=(archive/arxiv_seen.json)
          fi
          if [ -f archive/crawl_state.json ]; then
            private_archive_paths+=(archive/crawl_state.json)
          fi
          if [ -f archive/carryover.json ]; then
            private_archive_paths+=(archive/carryover.json)
          fi
          for d in archive/*/recommend; do
            private_archive_paths+=("$d")
          done

          git add "${public_paths[@]}"
          if [ "${#private_archive_paths[@]}" -gt 0 ]; then
            # archive/* is ignored for public safety; force-add only private daily artifacts.
            git add -f "${private_archive_paths[@]}"
          fi
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "[chore] daily pipeline"

          if [ "${GITHUB_REPOSITORY}" != "BBIC-Lab/AI_Paper_Hub" ]; then
            echo "::error::Refusing to push daily results outside private downstream BBIC-Lab/AI_Paper_Hub."
            exit 1
          fi
          git config --local http.version HTTP/1.1

          sync_and_push() {
            git rebase --abort >/dev/null 2>&1 || true
            git fetch origin "$branch"
            git rebase -X theirs "origin/$branch"
            git push origin HEAD:"$branch"
          }

          attempt=1
          delay=5
          until sync_and_push; do
            if [ "$attempt" -ge 6 ]; then
              echo "::error::Failed to push daily results after ${attempt} attempts."
              exit 1
            fi
            echo "Git sync/push failed; retry ${attempt}/5 after ${delay}s." >&2
            sleep "$delay"
            attempt=$((attempt + 1))
            delay=$((delay * 2))
          done
