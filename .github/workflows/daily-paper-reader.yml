name: daily-paper-reader

on:
  schedule:
    - cron: "0 19 * * 0-4" # 北京时间周一至周五 03:00（UTC 周日至周四 19:00）
  workflow_dispatch:
    inputs:
      run_enrich:
        description: "Run 0.enrich_config_queries.py（默认关闭，按需开启）"
        required: false
        default: "false"
      fetch_days:
        description: "回溯抓取天数（例如 5 或 30）；留空则使用默认配置"
        required: false
        default: "5"
      fetch_mode:
        description: "抓取模式：auto/standard/skims（auto 按 fetch-days 阈值决定，standard/ skims 强制）"
        required: false
        default: "auto"
      profile_tag:
        description: "仅运行指定词条 tag；留空表示全量运行"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: daily-paper-reader
  cancel-in-progress: false

jobs:
  run:
    if: github.repository == 'BBIC-Lab/AI_Paper_Hub'
    runs-on: [self-hosted, linux, dpr-local-inference]
    timeout-minutes: 120
    env:
      DPR_LLM_PROVIDER: ${{ vars.DPR_LLM_PROVIDER || 'openai' }}
      DPR_LLM_API_KEY: ${{ secrets.DPR_LLM_API_KEY }}
      DPR_LLM_BASE_URL: ${{ vars.DPR_LLM_BASE_URL }}
      DPR_LLM_MODEL: ${{ vars.DPR_LLM_MODEL }}
      DPR_LLM_REWRITE_MODEL: ${{ vars.DPR_LLM_REWRITE_MODEL }}
      DPR_LLM_FILTER_MODEL: ${{ vars.DPR_LLM_FILTER_MODEL }}
      DPR_LLM_SUMMARY_MODEL: ${{ vars.DPR_LLM_SUMMARY_MODEL }}
      MODEL_API_KEY: ${{ secrets.MODEL_API_KEY }}
      DPR_SKIP_RERANK: ${{ vars.DPR_SKIP_RERANK || 'false' }}
      DPR_EMBED_PROFILE: ${{ vars.DPR_EMBED_PROFILE || 'custom' }}
      DPR_EMBED_PROVIDER: ${{ vars.DPR_EMBED_PROVIDER || 'openai' }}
      DPR_EMBED_MODEL: ${{ vars.DPR_EMBED_MODEL || 'BAAI/bge-m3' }}
      DPR_EMBED_ENDPOINT: ${{ vars.DPR_EMBED_ENDPOINT || 'http://127.0.0.1:8010/v1/embeddings' }}
      EMBED_ENDPOINT: ${{ vars.DPR_EMBED_ENDPOINT || 'http://127.0.0.1:8010/v1/embeddings' }}
      DPR_EMBED_API_KEY: ${{ secrets.MODEL_API_KEY }}
      DPR_EMBED_API_TIMEOUT: ${{ vars.DPR_EMBED_API_TIMEOUT || '60' }}
      DPR_EMBED_REMOTE_FALLBACK: ${{ vars.DPR_EMBED_REMOTE_FALLBACK || 'fail' }}
      DPR_DISABLE_SUPABASE_VECTOR: ${{ vars.DPR_DISABLE_SUPABASE_VECTOR || 'false' }}
      DPR_RERANK_PROVIDER: ${{ vars.DPR_RERANK_PROVIDER || 'openai' }}
      DPR_RERANK_MODEL: ${{ vars.DPR_RERANK_MODEL || 'Qwen/Qwen3-Reranker-0.6B' }}
      DPR_RERANK_ENDPOINT: ${{ vars.DPR_RERANK_ENDPOINT || 'http://127.0.0.1:8011/v1/rerank' }}
      RERANK_ENDPOINT: ${{ vars.DPR_RERANK_ENDPOINT || 'http://127.0.0.1:8011/v1/rerank' }}
      DPR_RERANK_API_KEY: ${{ secrets.MODEL_API_KEY }}
      DPR_RERANK_API_TIMEOUT: ${{ vars.DPR_RERANK_API_TIMEOUT || '60' }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify private downstream target
        run: |
          set -euo pipefail

          if [ "${GITHUB_REPOSITORY}" != "BBIC-Lab/AI_Paper_Hub" ]; then
            echo "::error::daily-paper-reader is only allowed in private downstream BBIC-Lab/AI_Paper_Hub."
            exit 1
          fi

          origin_url="$(git remote get-url origin || true)"
          case "$origin_url" in
            *"BBIC-Lab/AI_Paper_Hub"*) ;;
            *)
              echo "::error::origin is not the BBIC private downstream repository; refusing to run."
              exit 1
              ;;
          esac
          case "$origin_url" in
            *"AI_Daily_Paper_Reader"*)
              echo "::error::origin points to the public upstream repository; refusing to run."
              exit 1
              ;;
          esac

          echo "Private downstream origin verified; generated reports will be pushed only to origin."

      - name: Check auto daily status
        id: daily_auto
        if: github.event_name == 'schedule'
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def parse_bool(value):
              token = str(value or "").split("#", 1)[0].strip().strip("'\"").lower()
              if token in {"false", "no", "off", "0"}:
                  return False
              if token in {"true", "yes", "on", "1"}:
                  return True
              return None

          enabled = True
          section = None
          config_path = Path("config.yaml")
          if config_path.exists():
              for raw in config_path.read_text(encoding="utf-8").splitlines():
                  stripped = raw.strip()
                  if not stripped or stripped.startswith("#"):
                      continue
                  indent = len(raw) - len(raw.lstrip(" "))
                  if indent == 0 and stripped.endswith(":"):
                      section = stripped[:-1].strip()
                      continue
                  if indent == 0:
                      section = None
                  if section == "daily_reports" and indent > 0 and stripped.startswith("enabled:"):
                      parsed = parse_bool(stripped.split(":", 1)[1])
                      if parsed is not None:
                          enabled = parsed
                      break

          value = "true" if enabled else "false"
          with open(Path.cwd() / ".github_output_daily", "w", encoding="utf-8") as tmp:
              tmp.write(f"enabled={value}\n")
          print(f"daily_reports.enabled={value}")
          PY
          cat .github_output_daily >> "$GITHUB_OUTPUT"
          rm -f .github_output_daily

      - name: Stop scheduled auto daily
        if: github.event_name == 'schedule' && steps.daily_auto.outputs.enabled == 'false'
        run: echo "Scheduled daily report is paused by config.yaml daily_reports.enabled=false."

      - name: Random delay to spread scheduled runs
        if: github.event_name == 'schedule' && steps.daily_auto.outputs.enabled != 'false'
        run: |
          DELAY=$(shuf -i 0-3599 -n 1)
          echo "Sleeping ${DELAY}s (≈$((DELAY/60))min) to stagger fork runs over 1 hour …"
          sleep $DELAY

      - name: Preflight local inference
        if: steps.daily_auto.outputs.enabled != 'false'
        run: |
          set -euo pipefail

          fail() {
            echo "::error::$1" >&2
            exit 1
          }

          require_loopback_endpoint() {
            name="$1"
            url="$2"
            port="$3"
            path="$4"
            if [ -z "$url" ]; then
              fail "$name is empty; set the repository Variable or keep the workflow default."
            fi
            case "$url" in
              "http://127.0.0.1:${port}${path}") ;;
              *)
                fail "$name must be http://127.0.0.1:${port}${path} on the self-hosted runner."
                ;;
            esac
          }

          check_health() {
            name="$1"
            url="$2"
            code="$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 "$url" || true)"
            if [ "$code" != "200" ]; then
              fail "$name health check failed at $url with HTTP ${code:-curl-failed}; ensure the local service is running on spark-d326 loopback."
            fi
            echo "$name health OK."
          }

          [ -n "${MODEL_API_KEY:-}" ] || fail "MODEL_API_KEY GitHub Secret is required for Bearer preflight."
          [ -n "${DPR_EMBED_MODEL:-}" ] || fail "DPR_EMBED_MODEL is required."
          [ -n "${DPR_RERANK_MODEL:-}" ] || fail "DPR_RERANK_MODEL is required."
          [ "${DPR_SKIP_RERANK:-true}" = "false" ] || fail "DPR_SKIP_RERANK must be false to use the local reranker."

          require_loopback_endpoint "DPR_EMBED_ENDPOINT" "$DPR_EMBED_ENDPOINT" "8010" "/v1/embeddings"
          require_loopback_endpoint "DPR_RERANK_ENDPOINT" "$DPR_RERANK_ENDPOINT" "8011" "/v1/rerank"
          check_health "Embedding" "http://127.0.0.1:8010/health"
          check_health "Reranker" "http://127.0.0.1:8011/health"

          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request


          def fail(message: str) -> None:
              print(f"::error::{message}", file=sys.stderr)
              raise SystemExit(1)


          def post_json(name: str, url: str, payload: dict, timeout_var: str) -> dict:
              body = json.dumps(payload).encode("utf-8")
              request = urllib.request.Request(
                  url,
                  data=body,
                  headers={
                      "Content-Type": "application/json",
                      "Authorization": f"Bearer {os.environ['MODEL_API_KEY']}",
                  },
                  method="POST",
              )
              try:
                  timeout = int(os.environ.get(timeout_var, "60") or "60")
              except ValueError:
                  fail(f"{timeout_var} must be an integer number of seconds.")
              try:
                  with urllib.request.urlopen(request, timeout=timeout) as response:
                      if response.status < 200 or response.status >= 300:
                          fail(f"{name} preflight failed with HTTP {response.status}.")
                      raw = response.read()
              except urllib.error.HTTPError as exc:
                  fail(f"{name} preflight failed with HTTP {exc.code}; check model name, endpoint, and service auth.")
              except Exception as exc:
                  fail(f"{name} preflight failed before response: {exc.__class__.__name__}: {exc}")
              try:
                  return json.loads(raw.decode("utf-8") or "{}")
              except Exception as exc:
                  fail(f"{name} preflight returned non-JSON response: {exc.__class__.__name__}.")


          embed = post_json(
              "Embedding",
              os.environ["DPR_EMBED_ENDPOINT"],
              {"model": os.environ["DPR_EMBED_MODEL"], "input": ["preflight"]},
              "DPR_EMBED_API_TIMEOUT",
          )
          data = embed.get("data")
          if not isinstance(data, list) or not data:
              fail("Embedding preflight response missing non-empty data list.")
          embedding = data[0].get("embedding") if isinstance(data[0], dict) else None
          if not isinstance(embedding, list) or not embedding:
              fail("Embedding preflight response missing embedding vector.")
          print("Embedding model interface OK.")

          rerank = post_json(
              "Reranker",
              os.environ["DPR_RERANK_ENDPOINT"],
              {
                  "model": os.environ["DPR_RERANK_MODEL"],
                  "query": "preflight",
                  "documents": ["first candidate", "second candidate"],
                  "top_n": 1,
              },
              "DPR_RERANK_API_TIMEOUT",
          )
          results = rerank.get("results")
          if results is None and isinstance(rerank.get("output"), dict):
              results = rerank["output"].get("results")
          if results is None:
              results = rerank.get("data")
          if not isinstance(results, list):
              fail("Reranker preflight response missing results/data list.")
          print("Reranker model interface OK.")
          PY

      - name: Setup Python
        if: steps.daily_auto.outputs.enabled != 'false'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Java
        if: steps.daily_auto.outputs.enabled != 'false'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Python deps
        if: steps.daily_auto.outputs.enabled != 'false'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.cache/uv
            ~/.cache/torch
            ~/.cache/dpr-tools/pdffigures2
            ~/.cache/coursier
            ~/.ivy2/cache
            ~/.sbt
          key: ${{ runner.os }}-dpr-remote-deps-v1-${{ hashFiles('requirements.txt') }}

      - name: Install deps (remote inference profile)
        if: steps.daily_auto.outputs.enabled != 'false'
        run: |
          python - <<'PY'
          import re

          # self-hosted 工作站使用 8010/8011 远程推理，跳过本地 torch/CUDA 栈。
          skip_names = {"sqlite3", "sentence-transformers", "torch", "cuda-toolkit"}
          skip_prefixes = ("nvidia-",)
          kept = []
          skipped = []
          for line in open("requirements.txt", "r", encoding="utf-8").read().splitlines():
              item = line.strip()
              if not item:
                  continue
              package = re.split(r"\s*(?:[<>=!~]=?|;|\[)", item, 1)[0].lower().replace("_", "-")
              if package in skip_names or package.startswith(skip_prefixes):
                  skipped.append(item)
                  continue
              kept.append(line)
          open("/tmp/req.txt", "w", encoding="utf-8").write("\n".join(kept))
          print("Skipped remote-runner deps:", ", ".join(skipped) or "<none>")
          PY
          python -m pip install --upgrade pip
          python -m pip install uv
          UV_HTTP_TIMEOUT="${UV_HTTP_TIMEOUT:-120}" uv pip install --system -r /tmp/req.txt

      - name: Prepare pdffigures2
        if: steps.daily_auto.outputs.enabled != 'false'
        run: |
          set -euo pipefail

          TOOL_DIR="$HOME/.cache/dpr-tools/pdffigures2"
          SRC_DIR="$TOOL_DIR/src"
          JAR_PATH="$TOOL_DIR/pdffigures2.jar"

          configure_java_proxy() {
            local proxy="${https_proxy:-${HTTPS_PROXY:-}}"
            if [ -z "$proxy" ]; then
              return 0
            fi
            proxy="${proxy#*://}"
            proxy="${proxy%%/*}"
            local host="${proxy%%:*}"
            local port="${proxy##*:}"
            if [ -z "$host" ] || [ -z "$port" ] || [ "$host" = "$port" ]; then
              echo "::warning::Unable to parse HTTPS proxy for Java tools; continuing without JVM proxy options."
              return 0
            fi
            # sbt/coursier runs inside the JVM and does not reliably honor https_proxy.
            export JAVA_TOOL_OPTIONS="${JAVA_TOOL_OPTIONS:-} -Dhttp.proxyHost=${host} -Dhttp.proxyPort=${port} -Dhttps.proxyHost=${host} -Dhttps.proxyPort=${port} -Dhttp.nonProxyHosts=localhost|127.0.0.1"
          }

          retry() {
            local attempt=1
            local delay=5
            until "$@"; do
              if [ "$attempt" -ge 6 ]; then
                return 1
              fi
              echo "Retry ${attempt}/5 after ${delay}s: $*" >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          mkdir -p "$TOOL_DIR"
          if [ ! -f "$JAR_PATH" ]; then
            configure_java_proxy
            if [ ! -d "$SRC_DIR/.git" ]; then
              if [ -e "$SRC_DIR" ]; then
                echo "::error::$SRC_DIR exists but is not a git checkout; move it aside before retrying."
                exit 1
              fi
              retry git clone --depth 1 https://github.com/allenai/pdffigures2 "$SRC_DIR"
            fi
            cd "$SRC_DIR"
            if [ ! -x ./sbt/bin/sbt ]; then
              retry curl --retry 5 --retry-all-errors --retry-delay 5 --connect-timeout 30 --max-time 300 -fsSL -o sbt.tgz https://github.com/sbt/sbt/releases/download/v1.10.1/sbt-1.10.1.tgz
              tar -xzf sbt.tgz
            fi
            retry ./sbt/bin/sbt assembly
            cp pdffigures2.jar "$JAR_PATH"
          fi

          echo "PDFFIGURES2_JAR=$JAR_PATH" >> "$GITHUB_ENV"

      - name: Run Retrieval and Embedding
        if: steps.daily_auto.outputs.enabled != 'false'
        env:
          HF_HOME: ${{ github.workspace }}/hf_cache
          HUGGINGFACE_HUB_CACHE: ${{ github.workspace }}/hf_cache
          HF_HUB_DISABLE_SYMLINKS: "1"
        run: |
          echo "Cleaning any previous local cache..."
          rm -rf ${{ github.workspace }}/hf_cache

          echo "=== Debug: runtime env ==="
          echo "PWD=$(pwd)"
          echo "HOME=$HOME"
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "HF_HOME=$HF_HOME"
          echo "HUGGINGFACE_HUB_CACHE=$HUGGINGFACE_HUB_CACHE"
          echo "HF_HUB_DISABLE_SYMLINKS=$HF_HUB_DISABLE_SYMLINKS"
          echo "TRANSFORMERS_CACHE=${TRANSFORMERS_CACHE:-<unset>}"
          echo "XDG_CACHE_HOME=${XDG_CACHE_HOME:-<unset>}"
          echo "--- env (filtered) ---"
          env | grep -E '^(HF_|HUGGINGFACE_|TRANSFORMERS_|XDG_|HOME=|GITHUB_WORKSPACE=)' | sort || true

          echo "--- python/hf versions ---"
          python - <<'PY'
          import os
          def v(mod):
            try:
              m = __import__(mod)
              return getattr(m, "__version__", "<no __version__>")
            except Exception as e:
              return f"<import failed: {e}>"

          print("python_exe:", os.environ.get("PYTHON", ""))
          print("HF_HOME env:", os.environ.get("HF_HOME"))
          print("HUGGINGFACE_HUB_CACHE env:", os.environ.get("HUGGINGFACE_HUB_CACHE"))
          print("HF_HUB_DISABLE_SYMLINKS env:", os.environ.get("HF_HUB_DISABLE_SYMLINKS"))
          print("TRANSFORMERS_CACHE env:", os.environ.get("TRANSFORMERS_CACHE"))
          print("versions:", {
            "huggingface_hub": v("huggingface_hub"),
            "transformers": v("transformers"),
            "sentence_transformers": v("sentence_transformers"),
          })
          try:
            from huggingface_hub import constants as c
            print("hub.constants:", {
              "HF_HOME": getattr(c, "HF_HOME", None),
              "HUGGINGFACE_HUB_CACHE": getattr(c, "HUGGINGFACE_HUB_CACHE", None),
              "HF_HUB_DISABLE_SYMLINKS": getattr(c, "HF_HUB_DISABLE_SYMLINKS", None),
            })
          except Exception as e:
            print("hub.constants import failed:", e)
          PY

          echo "--- cache dir check ---"
          echo "[legacy] ~/.cache/huggingface:"
          ls -la ~/.cache/huggingface || true
          echo "[current] $HF_HOME:"
          ls -la "$HF_HOME" || true

          echo "Running main script..."
          RUN_ENRICH="${{ github.event.inputs.run_enrich }}"
          FETCH_DAYS="${{ github.event.inputs.fetch_days }}"
          FETCH_MODE="${{ github.event.inputs.fetch_mode }}"
          PROFILE_TAG="${{ github.event.inputs.profile_tag }}"
          if [ -z "$FETCH_DAYS" ]; then
            FETCH_DAYS="5"
          fi
          ARGS=()
          if [ "$RUN_ENRICH" = "true" ]; then
            ARGS+=(--run-enrich)
          fi
          if [ -n "$FETCH_DAYS" ]; then
            ARGS+=(--fetch-days "$FETCH_DAYS")
          fi
          if [ "${{ github.event_name }}" = "schedule" ]; then
            ARGS+=(--fetch-ignore-seen)
          fi
          if [ -n "$FETCH_MODE" ]; then
            ARGS+=(--fetch-mode "$FETCH_MODE")
          fi
          if [ -n "$PROFILE_TAG" ]; then
            ARGS+=(--profile-tag "$PROFILE_TAG")
          fi
          python src/main.py "${ARGS[@]}" --embedding-device cpu --embedding-batch-size 8

          # 让前端可以在不配置 GitHub Token 的情况下直接读取配置（只读快照）
          cp -f config.yaml docs/config.yaml

          echo "--- post-run cache symlink check ---"
          find "$HF_HOME" -xtype l | head -n 50 || true

      - name: Cleanup non-recommend archives
        if: steps.daily_auto.outputs.enabled != 'false'
        run: |
          find archive -mindepth 2 -maxdepth 2 -type d \( -name raw -o -name filtered -o -name rank \) -exec rm -rf {} +

      - name: Commit results
        if: steps.daily_auto.outputs.enabled != 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          branch="${GITHUB_REF_NAME:-main}"

          shopt -s nullglob
          paths=(docs config.yaml)
          if [ -f archive/arxiv_seen.json ]; then
            paths+=(archive/arxiv_seen.json)
          fi
          if [ -f archive/crawl_state.json ]; then
            paths+=(archive/crawl_state.json)
          fi
          if [ -f archive/carryover.json ]; then
            paths+=(archive/carryover.json)
          fi
          for d in archive/*/recommend; do
            paths+=("$d")
          done

          git add "${paths[@]}"
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "[chore] daily pipeline"

          if [ "${GITHUB_REPOSITORY}" != "BBIC-Lab/AI_Paper_Hub" ]; then
            echo "::error::Refusing to push daily results outside private downstream BBIC-Lab/AI_Paper_Hub."
            exit 1
          fi
          git fetch origin "$branch"
          git rebase -X theirs "origin/$branch"
          git push origin HEAD:"$branch"
