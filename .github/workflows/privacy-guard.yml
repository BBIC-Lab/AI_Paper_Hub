name: Privacy Guard

on:
  schedule:
    - cron: "0 20 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  privacy-guard:
    if: github.repository == 'Jurio0304/AI_Daily_Paper_Reader'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Check public template privacy
        run: python scripts/privacy_guard.py
